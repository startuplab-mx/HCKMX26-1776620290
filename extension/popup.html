<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guard · Pacto Digital</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #fafafa;
      color: #18181b;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #e4e4e7;
      background: white;
    }
    .header-title { font-weight: 600; font-size: 14px; color: #18181b; }
    .header-sub { font-size: 11px; color: #71717a; margin-top: 1px; }
    .body { padding: 16px; }
    label { display: block; font-size: 12px; font-weight: 500; color: #3f3f46; margin-bottom: 4px; }
    input, textarea {
      width: 100%;
      border: 1px solid #d4d4d8;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      outline: none;
      background: white;
      color: #18181b;
    }
    input:focus, textarea:focus { border-color: #71717a; box-shadow: 0 0 0 1px #71717a; }
    textarea { resize: vertical; min-height: 72px; font-family: inherit; }
    .btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity .15s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: #18181b; color: white; }
    .btn-primary:not(:disabled):hover { background: #3f3f46; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-danger:not(:disabled):hover { background: #b91c1c; }
    .btn-ghost {
      background: transparent;
      border: 1px solid #d4d4d8;
      color: #52525b;
      font-size: 11px;
      padding: 5px 10px;
      width: auto;
    }
    .btn-ghost:hover { background: #f4f4f5; }
    .stack { display: flex; flex-direction: column; gap: 10px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }
    .tag-bajo { background: #d1fae5; color: #065f46; }
    .tag-medio { background: #fef3c7; color: #92400e; }
    .tag-alto { background: #fee2e2; color: #991b1b; }
    .bar-wrap { background: #e4e4e7; border-radius: 4px; height: 5px; overflow: hidden; margin-top: 3px; }
    .bar { height: 100%; background: #18181b; border-radius: 4px; transition: width .3s; }
    .bar-alto { background: #dc2626; }
    .bar-medio { background: #d97706; }
    .result-item { margin-bottom: 8px; }
    .result-label { display: flex; justify-content: space-between; font-size: 12px; color: #3f3f46; }
    .error { background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 8px 10px; color: #991b1b; font-size: 12px; }
    .info { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 6px; padding: 8px 10px; color: #0c4a6e; font-size: 12px; }
    .success { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; padding: 8px 10px; color: #14532d; font-size: 12px; }
    .divider { border: none; border-top: 1px solid #e4e4e7; margin: 4px 0; }
    .text-muted { color: #71717a; font-size: 11px; }
    .section-title { font-weight: 600; font-size: 12px; color: #18181b; margin-bottom: 8px; }
    #app { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-title">Guard</div>
      <div class="header-sub">Pacto Digital · On-device</div>
    </div>
    <span id="status-badge" class="tag" style="display:none"></span>
  </div>

  <!-- Login -->
  <div id="view-login" class="body">
    <div class="stack">
      <div>
        <label for="email">Correo</label>
        <input type="email" id="email" placeholder="menor@ejemplo.com" />
      </div>
      <div>
        <label for="password">Contraseña</label>
        <input type="password" id="password" />
      </div>
      <div id="login-error" class="error" style="display:none"></div>
      <button class="btn btn-primary" id="btn-login">Iniciar sesión</button>
      <p class="text-muted" style="text-align:center">Solo menores con pacto firmado pueden enviar señales.</p>
    </div>
  </div>

  <!-- Classifier -->
  <div id="view-app" class="body" style="display:none">
    <div class="stack">
      <div id="app-header" class="row">
        <div>
          <div class="section-title" id="user-name">—</div>
          <div class="text-muted">Menor · Pacto activo</div>
        </div>
        <button class="btn btn-ghost" id="btn-logout">Salir</button>
      </div>
      <hr class="divider" />

      <div id="model-loading" class="info" style="display:none">
        Cargando modelo… <span id="model-progress"></span>
      </div>

      <div>
        <label for="message">Mensaje a analizar</label>
        <textarea id="message" placeholder="Pega aquí el mensaje que quieres analizar…"></textarea>
      </div>

      <button class="btn btn-primary" id="btn-analyze">Analizar (on-device)</button>

      <div id="results" style="display:none">
        <hr class="divider" />
        <div class="section-title row">
          Resultados
          <span id="risk-tag" class="tag"></span>
        </div>
        <div id="result-bars"></div>
        <div id="signal-sent" class="success" style="display:none">
          Señal enviada al dashboard.
        </div>
        <button class="btn btn-danger" id="btn-send" style="display:none">
          Enviar señal al dashboard
        </button>
      </div>

      <div id="app-error" class="error" style="display:none"></div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
